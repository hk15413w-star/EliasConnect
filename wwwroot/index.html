<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elias Connect</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0f;color:#e0e0e0;font-family:'Segoe UI',sans-serif;height:100vh;display:flex}
        .sidebar{width:360px;min-width:360px;background:#12121a;padding:14px;border-right:1px solid #252535;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
        .sidebar h2{color:#50cd32;font-size:1rem}
        .card{background:#1a1a28;padding:10px 12px;border-radius:8px;font-size:.75rem;border:1px solid #252535;margin-bottom:6px}
        .card .devname{color:#fff;font-weight:bold;font-size:.8rem}
        .card .ip{color:#50cd32}
        .card .loc{color:#aaa;font-size:.7rem}
        .card .geo{color:#666;font-size:.7rem}
        .card .time{color:#555;font-size:.65rem}
        .card .actions{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
        .card .actions button{padding:3px 8px;font-size:.65rem;border:1px solid #50cd32;background:transparent;color:#50cd32;border-radius:4px;cursor:pointer}
        .card .actions button.danger{border-color:#ff4444;color:#ff4444}
        .dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
        .dot.on{background:#50cd32}.dot.off{background:#555}
        .mybox{background:#1a1a28;padding:8px 12px;border-radius:6px;font-size:.75rem;color:#aaa}
        .mybox span{color:#50cd32;font-weight:bold}
        .login{background:#1a1a28;padding:12px;border-radius:8px;border:1px solid #333}
        .login input{width:100%;background:#0d0d15;border:1px solid #333;padding:10px;color:#fff;border-radius:6px;font-size:.8rem;margin-bottom:8px}
        .login input:focus{outline:none;border-color:#50cd32}
        .login button{width:100%;background:#50cd32;color:#000;border:none;padding:10px;border-radius:6px;font-weight:bold;cursor:pointer}
        .btn-clear{background:#ff4444;color:#fff;border:none;padding:8px;border-radius:6px;cursor:pointer;font-weight:bold;margin-top:4px}
        .main{flex:1;display:flex;flex-direction:column;min-width:0}
        .header{background:#12121a;padding:14px 16px;border-bottom:1px solid #252535;display:flex;justify-content:space-between;align-items:center}
        .header h1{color:#50cd32;font-size:1.1rem}
        .tabs{display:flex;background:#12121a;border-bottom:1px solid #252535}
        .tab{padding:10px 20px;cursor:pointer;color:#aaa;font-size:.85rem;border-bottom:2px solid transparent}
        .tab.active{color:#50cd32;border-bottom-color:#50cd32}
        .chat-container{flex:1;position:relative}
        .chat-panel{position:absolute;top:0;left:0;width:100%;height:100%;overflow-y:auto;padding:16px;display:none}
        .chat-panel.active{display:block}
        .msg{margin-bottom:10px;animation:fadeIn .3s;position:relative; display:flex; align-items: flex-start; gap: 8px;}
        .msg:hover .delete-btn{opacity:1}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .msg .uname{font-weight:bold;font-size:.8rem}
        .msg .uname.admin{color:#ffaa00}.msg .uname.normal{color:#50cd32}
        .msg .time{color:#555;font-size:.65rem;margin-left:8px}
        .msg .text{color:#ddd;margin-top:3px;word-wrap:break-word;font-size:.9rem; flex: 1;}
        .delete-btn{opacity:0; background:none; border:none; color:#ff4444; cursor:pointer; font-size:1rem; padding:0 4px; transition:0.2s;}
        .delete-btn:hover{color:#ff8888}
        .private-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:#12121a;border-bottom:1px solid #252535}
        .private-bar select{flex:1;background:#1a1a28;color:#fff;border:1px solid #333;padding:8px;border-radius:6px}
        .private-bar button{background:#ff4444;color:#fff;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:.75rem}
        .input-area{background:#12121a;padding:12px 16px;border-top:1px solid #252535;display:flex;gap:8px;align-items:center}
        .input-area input{flex:1;background:#1a1a28;border:1px solid #333;padding:10px 12px;color:#fff;border-radius:8px;font-size:.85rem;min-width:0}
        .input-area input:focus{outline:none;border-color:#50cd32}
        .input-area button{background:#50cd32;color:#000;border:none;padding:10px 16px;border-radius:8px;cursor:pointer;font-weight:bold;white-space:nowrap;font-size:.85rem}
        .save-check{display:flex;align-items:center;gap:4px;color:#aaa;font-size:.7rem;white-space:nowrap}
        .save-check input{accent-color:#50cd32}
        .toggle-btn{display:none;background:#50cd32;color:#000;border:none;padding:6px 12px;border-radius:6px;font-size:.8rem;cursor:pointer;font-weight:bold}
        .overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:99}
        .overlay.show{display:block}
        .sidebar.mobile{display:flex!important;position:fixed;top:0;left:0;height:100%;z-index:100;width:300px}

        /* Popup thông báo lưu */
        .info-popup{position:fixed;top:20px;right:20px;background:#1a1a28;border:1px solid #50cd32;border-radius:8px;padding:16px 20px;z-index:200;max-width:300px;box-shadow:0 4px 15px rgba(0,0,0,0.5);animation:slideIn 0.3s ease}
        @keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
        .info-popup p{color:#ddd;font-size:.8rem;margin-bottom:8px}
        .info-popup button{background:#50cd32;color:#000;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:.8rem}
        @media(max-width:768px){.sidebar{display:none}.toggle-btn{display:block}}
    </style>
</head>
<body>

<!-- Popup thông báo lưu -->
<div id="saveInfoPopup" class="info-popup" style="display:none">
    <p>💡 <b>Lưu ý:</b> Bạn có thể lưu tin nhắn trong 2 ngày bằng cách tick vào ô "Lưu 2 ngày". Hãy chỉ dùng khi cần thiết để tránh đầy bộ nhớ.</p>
    <button onclick="closeInfoPopup()">Đã hiểu</button>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="sidebar" id="sidebar">
    <h2>Visitors</h2>
    <div class="mybox">Your IP: <span id="myip">...</span></div>
    <div class="mybox">Device: <span id="mydevice">...</span></div>
    <div class="login" id="loginbox">
        <input type="password" id="password" placeholder="Admin password..." onkeypress="if(event.key==='Enter')login()">
        <button onclick="login()">Login</button>
    </div>
    <button class="btn-clear" id="clearAllBtn" style="display:none" onclick="clearAll()">Clear All Visitors</button>
    <div id="visitorList"><div style="color:#555;font-size:.8rem;padding:20px;text-align:center">Login to see visitors</div></div>
</div>

<div class="main">
    <div class="header">
        <h1>Elias Connect</h1>
        <button class="toggle-btn" onclick="openSidebar()">Visitors</button>
    </div>
    <div class="tabs">
        <div class="tab active" id="tabPublic" onclick="switchTab('public')">Public</div>
        <div class="tab" id="tabPrivate" style="display:none" onclick="switchTab('private')">Admin Chat</div>
    </div>
    <div class="private-bar" id="privateBar" style="display:none">
        <span style="color:#aaa;font-size:.8rem">Chat with:</span>
        <select id="privateSelect" onchange="onPrivateSelect()"><option value="">-- Select --</option></select>
        <button onclick="endPrivateChat()">End</button>
    </div>
    <div class="chat-container">
        <div class="chat-panel active" id="publicMessages"></div>
        <div class="chat-panel" id="privateMessages"></div>
    </div>
    <div class="input-area">
        <input type="text" id="nameInput" placeholder="Name..." value="Guest" style="max-width:100px">
        <input type="text" id="msgInput" placeholder="Message..." onkeypress="if(event.key==='Enter')sendMsg()">
        <label class="save-check"><input type="checkbox" id="saveMsg"> Lưu 2 ngày</label>
        <button onclick="sendMsg()">Send</button>
    </div>
</div>

<script>
// ========== FIREBASE CONFIG ==========
const firebaseConfig = {
    databaseURL: "https://elias-chat-f5434-default-rtdb.asia-southeast1.firebasedatabase.app/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const messagesRef = db.ref("messages");

// ========== SIGNALR ==========
var conn = new signalR.HubConnectionBuilder().withUrl("/chat").build();
var isAdmin = false, myDeviceId = "", currentTab = 'public', activePrivateTarget = null;
var privateCache = {};
var allVisitors = [];

// ========== POPUP THÔNG BÁO ==========
function showSaveInfoPopup() {
    document.getElementById('saveInfoPopup').style.display = 'block';
    // Tự động ẩn sau 10 giây
    setTimeout(function(){ document.getElementById('saveInfoPopup').style.display = 'none'; }, 10000);
}
function closeInfoPopup() {
    document.getElementById('saveInfoPopup').style.display = 'none';
}

// ========== FIREBASE: Load lịch sử một lần ==========
function loadMessagesFromFirebase() {
    var cutoff = Date.now() - (2 * 24 * 60 * 60 * 1000);
    messagesRef.limitToLast(200).once("value", function(snapshot) {
        document.getElementById("publicMessages").innerHTML = '';
        snapshot.forEach(function(child) {
            var msg = child.val();
            if (msg.Timestamp && new Date(msg.Timestamp).getTime() > cutoff) {
                addMsgToPanelWithKey('public', child.key, msg.User, msg.Message, new Date(msg.Timestamp).toLocaleTimeString());
            } else {
                child.ref.remove();
            }
        });
    });
}

function saveMessageToFirebase(user, message) {
    if (!document.getElementById("saveMsg").checked) return;
    var newRef = messagesRef.push();
    newRef.set({
        User: user,
        Message: message,
        Timestamp: new Date().toISOString()
    });
    // Không cần làm gì thêm vì tin nhắn đã hiển thị qua SignalR
}

function deleteMessageFromFirebase(firebaseKey) {
    messagesRef.child(firebaseKey).remove();
}

// ========== SIGNALR EVENTS ==========
conn.start().then(function() {
    console.log("SignalR connected");
    showSaveInfoPopup(); // Hiển thị popup thông báo
    loadMessagesFromFirebase();
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(async function(p) {
            var info = "";
            try {
                var r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${p.coords.latitude}&lon=${p.coords.longitude}`);
                var d = await r.json();
                if(d.address) info = [d.address.country, d.address.state, d.address.city||d.address.town].filter(Boolean).join(", ");
            } catch(e) {}
            conn.invoke("UpdateLoc", p.coords.latitude, p.coords.longitude, info);
        }, function() {});
    }
}).catch(function(err) { console.error(err); });

conn.on("Init", function(ip, did) {
    document.getElementById("myip").textContent = ip || "Unknown";
    document.getElementById("mydevice").textContent = did || "Unknown";
    myDeviceId = did;
});

conn.on("Msg", function(u, dn, m, t) {
    addMsgToPanel('public', u, m, t);
    saveMessageToFirebase(u, m);
});
conn.on("History", function(h) {
    // Không dùng History vì đã load từ Firebase
});
conn.on("MessageDeleted", function(firebaseKey) {
    var el = document.querySelector(`[data-firebase-key="${firebaseKey}"]`);
    if (el) el.remove();
});
conn.on("AdminData", function(v) { allVisitors = v; renderVisitors(v); });
conn.on("PrivateOpened", function(targetId, history) {
    openPrivateTab(targetId);
    document.getElementById("privateMessages").innerHTML = '';
    if(history) history.forEach(function(m) { addMsgToPanel('private', m.Sender, m.Message, new Date(m.Timestamp).toLocaleTimeString()); });
});
conn.on("AdminStartedChat", function(adminName) {
    if(isAdmin) return;
    document.getElementById("tabPrivate").style.display = 'inline-block';
    activePrivateTarget = adminName;
    switchTab('private');
});
conn.on("PrivateMsg", function(targetId, sender, msg, time) {
    if(!privateCache[targetId]) privateCache[targetId] = [];
    privateCache[targetId].push({sender: sender, msg: msg, time: time});
    if(activePrivateTarget === targetId || (activePrivateTarget === sender && !isAdmin)) {
        addMsgToPanel('private', sender, msg, time);
    }
});
conn.on("PrivateEnded", function() {
    activePrivateTarget = null;
    document.getElementById("privateBar").style.display = 'none';
    if(currentTab === 'private') switchTab('public');
});

function addMsgToPanel(panelType, user, msg, time) {
    addMsgToPanelWithKey(panelType, null, user, msg, time);
}

function addMsgToPanelWithKey(panelType, firebaseKey, user, msg, time) {
    var panel = document.getElementById(panelType === 'public' ? 'publicMessages' : 'privateMessages');
    var div = document.createElement("div");
    div.className = "msg";
    if (firebaseKey) div.setAttribute("data-firebase-key", firebaseKey);
    
    var isAdminMsg = user.indexOf('[ADMIN]') === 0;
    div.innerHTML = `
        <button class="delete-btn" title="Xóa tin nhắn" onclick="deleteMessage('${firebaseKey || ''}')">✕</button>
        <div style="flex:1">
            <span class="uname ${isAdminMsg ? 'admin' : 'normal'}">${user}</span>
            <span class="time">${time}</span>
            <div class="text">${msg}</div>
        </div>
    `;
    panel.appendChild(div);
    panel.scrollTop = panel.scrollHeight;
}

function deleteMessage(firebaseKey) {
    if (!firebaseKey) return;
    if (!confirm("Bạn có chắc muốn xóa tin nhắn này?")) return;
    // Xóa trên Firebase
    deleteMessageFromFirebase(firebaseKey);
    // Xóa khỏi giao diện local
    var el = document.querySelector(`[data-firebase-key="${firebaseKey}"]`);
    if (el) el.remove();
    // Gửi SignalR để xóa trên các client khác
    conn.invoke("DeleteMessage", firebaseKey);
}

function sendMsg() {
    var m = document.getElementById("msgInput").value.trim();
    if(!m) return;
    if(currentTab === 'private' && activePrivateTarget) {
        if(isAdmin) conn.invoke("AdminSendPrivate", activePrivateTarget, m);
        else conn.invoke("VisitorSendPrivate", m);
    } else {
        var n = document.getElementById("nameInput").value || "Guest";
        conn.invoke("SendMsg", n, m, true);
    }
    document.getElementById("msgInput").value = '';
}

function switchTab(tab) {
    currentTab = tab;
    document.getElementById("tabPublic").classList.toggle("active", tab === 'public');
    document.getElementById("tabPrivate").classList.toggle("active", tab === 'private');
    document.getElementById("publicMessages").classList.toggle("active", tab === 'public');
    document.getElementById("privateMessages").classList.toggle("active", tab === 'private');
    if(tab === 'public') {
        document.getElementById("privateBar").style.display = 'none';
    } else {
        if(isAdmin) document.getElementById("privateBar").style.display = 'flex';
        document.getElementById("privateMessages").scrollTop = document.getElementById("privateMessages").scrollHeight;
    }
}

function openPrivateTab(targetId) {
    activePrivateTarget = targetId;
    document.getElementById("tabPrivate").style.display = 'inline-block';
    if(isAdmin) {
        document.getElementById("privateBar").style.display = 'flex';
        document.getElementById("privateSelect").value = targetId;
    }
    switchTab('private');
}

function onPrivateSelect() { var v = document.getElementById("privateSelect").value; if(v) conn.invoke("AdminStartPrivate", v); }
function endPrivateChat() { if(activePrivateTarget) conn.invoke("EndPrivate", activePrivateTarget); }

async function login() {
    var ok = await conn.invoke("Login", document.getElementById("password").value);
    if(!ok) { alert("Wrong password!"); return; }
    isAdmin = true;
    document.getElementById("loginbox").style.display = "none";
    document.getElementById("clearAllBtn").style.display = "block";
    document.getElementById("tabPrivate").style.display = 'inline-block';
    fetchVisitors();
}

async function fetchVisitors() { var r = await fetch("/api/visitors"); renderVisitors(await r.json()); }

function renderVisitors(v) {
    allVisitors = v || [];
    var l = document.getElementById("visitorList");
    if(!allVisitors.length) { l.innerHTML = '<div style="color:#555;font-size:.8rem;padding:20px;text-align:center">No visitors</div>'; return; }
    var h = "", sel = document.getElementById("privateSelect");
    sel.innerHTML = '<option value="">-- Select --</option>';
    allVisitors.forEach(function(v) {
        var ip = v.lastIp || v.firstIp || "Unknown", name = v.nickname || v.deviceId, on = v.online, loc = v.locationInfo || "";
        h += '<div class="card"><span class="dot ' + (on ? 'on' : 'off') + '"></span><span class="devname">' + name + '</span>';
        if(isAdmin) { h += '<div class="actions">'; if(on && v.deviceId !== myDeviceId) h += '<button onclick="conn.invoke(\'AdminStartPrivate\',\'' + v.deviceId + '\')">Private Chat</button>'; h += '<button class="danger" onclick="conn.invoke(\'DeleteVisitor\',\'' + v.deviceId + '\')">Delete</button></div>'; }
        h += '<span class="ip">IP: ' + ip + '</span><br>';
        if(loc) h += '<span class="loc">📍 ' + loc + '</span><br>';
        if(v.lat && v.lng) h += '<span class="geo">GPS: ' + Number(v.lat).toFixed(4) + ', ' + Number(v.lng).toFixed(4) + '</span><br>';
        h += '<span class="time">' + new Date(v.lastSeen).toLocaleTimeString() + '</span></div>';
        if(isAdmin && on && v.deviceId !== myDeviceId) sel.innerHTML += '<option value="' + v.deviceId + '">' + name + '</option>';
    });
    l.innerHTML = h;
}

setInterval(function() { if(isAdmin) fetchVisitors(); }, 10000);
function openSidebar() { document.getElementById("sidebar").classList.add("mobile"); document.getElementById("overlay").classList.add("show"); }
function closeSidebar() { document.getElementById("sidebar").classList.remove("mobile"); document.getElementById("overlay").classList.remove("show"); }
async function clearAll() { if(!confirm("Clear all visitors?")) return; await conn.invoke("ClearAll"); }
</script>
</body>
</html>
